# GPU grid sweep: Monte Carlo CBF parameter tuning via JAX vmap
# Requires CUDA-enabled JAX: pip install --upgrade "jax[cuda12]"
# Run with: cbfkit-bench sweep sweep_configs/single_integrator/gpu/sweep_grid.yaml

scenario: "monte_carlo_gpu_sweep"
seeds: "0:9"

sweep:
  method: grid
  parameters:
    alpha:
      linspace: [0.5, 3.0, 6]

output:
  dir: "./results/single_integrator/gpu/sweep_grid"
