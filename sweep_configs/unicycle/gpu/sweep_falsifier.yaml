# GPU falsifier sweep: find unsafe unicycle CBF parameter combos via JAX vmap
# Stops iterating seeds as soon as a safety violation is found.
# Requires CUDA-enabled JAX: pip install --upgrade "jax[cuda12]"
# Run with: cbfkit-bench sweep sweep_configs/unicycle/gpu/sweep_falsifier.yaml

scenario: "unicycle_obstacle_avoidance_sweep"
seeds: "0:9"

sweep:
  method: grid
  falsifier: true
  falsifier_metric: safety_violations
  parameters:
    alpha:
      linspace: [0.1, 15.0, 8]

output:
  dir: "./results/unicycle/gpu/sweep_falsifier"
