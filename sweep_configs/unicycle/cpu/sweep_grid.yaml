# CPU grid sweep: unicycle obstacle avoidance CBF parameter tuning
# Run with: cbfkit-bench sweep sweep_configs/unicycle/cpu/sweep_grid.yaml

scenario: "unicycle_obstacle_avoidance_sweep"
seeds: "0:2"

sweep:
  method: grid
  parameters:
    alpha:
      values: [1.0, 5.0, 10.0]
    Kp_theta:
      values: [2.0, 5.0, 10.0]

output:
  dir: "./results/unicycle/cpu/sweep_grid"
