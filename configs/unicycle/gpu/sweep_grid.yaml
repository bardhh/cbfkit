# GPU grid sweep: unicycle obstacle avoidance via JAX vmap
# Requires CUDA-enabled JAX: pip install --upgrade "jax[cuda12]"
# Run with: cbfkit-bench sweep configs/unicycle/gpu/sweep_grid.yaml

scenario: "unicycle_obstacle_avoidance_sweep"
seeds: "0:9"

sweep:
  method: grid
  parameters:
    alpha:
      linspace: [0.5, 15.0, 6]
    Kp_theta:
      values: [2.0, 5.0, 10.0]

output:
  dir: "./results/unicycle/gpu/sweep_grid"
