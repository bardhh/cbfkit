# CPU falsifier sweep: find unsafe unicycle CBF parameter combos
# Stops iterating seeds as soon as a safety violation is found.
# Run with: cbfkit-bench sweep configs/unicycle/cpu/sweep_falsifier.yaml

scenario: "unicycle_obstacle_avoidance_sweep"
seeds: "0:2"

sweep:
  method: grid
  falsifier: true
  falsifier_metric: safety_violations
  parameters:
    alpha:
      values: [0.1, 0.5, 1.0, 5.0, 10.0]

output:
  dir: "./results/unicycle/cpu/sweep_falsifier"
