# CPU Optuna sweep: single integrator CBF Bayesian optimization
# Lightweight — runs comfortably on CPU without GPU/CUDA.
# Requires: pip install cbfkit[optuna]
# Run with: cbfkit-bench sweep configs/cpu/sweep_optuna.yaml

scenario: "tutorial_single_integrator_sweep"
seeds: "0:2"

sweep:
  method: optuna
  n_samples: 20
  objective: safety_violation_rate
  direction: minimize

  parameters:
    alpha:
      range: [0.1, 10.0]
    control_limit:
      range: [1.0, 15.0]

output:
  dir: "./results/cpu/sweep_optuna"
