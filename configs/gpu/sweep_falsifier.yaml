# GPU falsifier sweep: find unsafe CBF parameter combos via JAX vmap
# Stops iterating seeds as soon as a safety violation is found.
# Requires CUDA-enabled JAX: pip install --upgrade "jax[cuda12]"
# Run with: cbfkit-bench sweep configs/gpu/sweep_falsifier.yaml

scenario: "monte_carlo_gpu_sweep"
seeds: "0:9"

sweep:
  method: grid
  falsifier: true
  falsifier_metric: safety_violations
  parameters:
    alpha:
      linspace: [0.1, 5.0, 6]
    control_limit:
      values: [1.0, 3.0, 5.0, 10.0]

output:
  dir: "./results/gpu/sweep_falsifier"
