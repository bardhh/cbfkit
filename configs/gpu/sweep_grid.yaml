# GPU grid sweep: Monte Carlo CBF parameter tuning via JAX vmap
# Requires CUDA-enabled JAX: pip install --upgrade "jax[cuda12]"
# Run with: cbfkit-bench sweep configs/gpu/sweep_grid.yaml

scenario: "monte_carlo_gpu_sweep"
seeds: "0:9"

sweep:
  method: grid
  parameters:
    alpha:
      linspace: [0.5, 3.0, 6]
    control_limit:
      values: [2.0, 5.0, 10.0]

output:
  dir: "./results/gpu/sweep_grid"
