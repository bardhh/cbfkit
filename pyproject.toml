[project]
name = "cbfkit"
version = "0.1.0"
description = "A Control Barrier Function Toolbox for Robotics Applications"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "jax>=0.4.13",
    "jaxlib>=0.4.13",
    "jaxopt>=0.8",
    "matplotlib>=3.7.1",
    "numpy>=1.24.3",
    "scipy>=1.10.1",
    "tqdm>=4.65.0",
    "jinja2>=3.1.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
