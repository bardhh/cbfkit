[mypy]
ignore_missing_imports = False
exclude = ^(tutorials/|tutorials/wip/|examples/wip/|build/|tests/test_models/generated/|tutorials/generated/)

# Explicitly ignore missing imports for libraries known to lack stubs or where stubs are not installed.
# This replaces the blanket ignore and encourages adding stubs or fixing types.

[mypy-kvxopt.*]
ignore_missing_imports = True

[mypy-cvxopt.*]
ignore_missing_imports = True

[mypy-control.*]
ignore_missing_imports = True

[mypy-rclpy.*]
ignore_missing_imports = True

[mypy-std_msgs.*]
ignore_missing_imports = True

[mypy-rospy.*]
ignore_missing_imports = True

[mypy-casadi.*]
ignore_missing_imports = True

[mypy-jaxopt.*]
ignore_missing_imports = True

[mypy-graphviz.*]
ignore_missing_imports = True

# Libraries that typically have stubs or good type support, we should try NOT to ignore them if possible.
# If errors persist, users can add them back individually.
# e.g., matplotlib, scipy, pandas, tensorflow, pytest, sympy
# We leave some commonly untyped ones for now to avoid immediate CI breakage, but we are being more specific.

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-tensorflow.*]
ignore_missing_imports = True

[mypy-sympy.*]
ignore_missing_imports = True
